<svg viewBox='0 0 800 600' xmlns='http://www.w3.org/2000/svg'>
  <!-- Background -->
  <rect width='800' height='600' fill='#F8F9FA'/>

  <!-- Title Text -->
  <text x='400' y='70' font-family='Arial, sans-serif' font-size='48' font-weight='bold' text-anchor='middle' fill='#343A40'>AI-Driven Art Creator</text>

  <!-- Subtitle Text -->
  <text x='400' y='120' font-family='Arial, sans-serif' font-size='24' text-anchor='middle' fill='#6C757D'>For Unique Home Decor</text>

  <!-- Abstract Shapes Section -->
  <g transform='translate(100, 220)'>
    <!-- Geometric Shapes -->
    <circle cx='150' cy='150' r='50' fill='#007BFF' opacity='0.8'/>
    <rect x='250' y='100' width='80' height='120' fill='#28A745' opacity='0.7' rx='10'/>
    <polygon points='400,50 450,150 350,150' fill='#FFC107' opacity='0.75'/>

    <!-- Flowing/Organic Shapes -->
    <path d='M500 100 C 550 120, 600 180, 550 250 S 450 300, 500 200 Z' fill='#DC3545' opacity='0.7'/>
    <path d='M650 150 C 700 170, 750 230, 700 300 S 600 350, 650 250 Z' fill='#6F42C1' opacity='0.85'/>
  </g>

  <!-- AI Brain Icon -->
  <g transform='translate(200, 450)'>
    <circle cx='50' cy='50' r='40' fill='#E9ECEF' stroke='#343A40' stroke-width='2'/>
    <path d='M50 10 C 30 10, 10 30, 10 50 C 10 70, 30 90, 50 90 C 70 90, 90 70, 90 50 C 90 30, 70 10, 50 10 Z' fill='none' stroke='#007BFF' stroke-width='3'/>
    <circle cx='35' cy='35' r='5' fill='#007BFF'/>
    <circle cx='65' cy='35' r='5' fill='#007BFF'/>
    <circle cx='35' cy='65' r='5' fill='#007BFF'/>
    <circle cx='65' cy='65' r='5' fill='#007BFF'/>
    <line x1='50' y1='0' x2='50' y2='100' stroke='#007BFF' stroke-width='2'/>
    <line x1='0' y1='50' x2='100' y2='50' stroke='#007BFF' stroke-width='2'/>
  </g>

  <!-- Brush/Palette Icon -->
  <g transform='translate(550, 450)'>
    <path d='M10 80 C 20 90, 50 90, 60 80 L 70 60 C 75 50, 70 40, 60 35 L 30 20 C 20 15, 10 25, 5 35 L 0 60 C -5 70, 0 80, 10 80 Z' fill='#6C757D'/>
    <circle cx='25' cy='50' r='15' fill='#FFD166'/>
    <circle cx='55' cy='50' r='15' fill='#00A3E0'/>
  </g>

  <!-- Home Decor Element (Stylized Frame) -->
  <g transform='translate(350, 380)'>
    <rect x='-125' y='-100' width='250' height='200' fill='#CED4DA' rx='15' ry='15'/>
    <rect x='-115' y='-90' width='230' height='180' fill='#FFFFFF' rx='10' ry='10'/>
    <rect x='-105' y='-80' width='210' height='160' fill='#F8F9FA' rx='5' ry='5'/>
  </g>

</svg>